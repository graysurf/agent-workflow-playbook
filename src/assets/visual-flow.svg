  <rect x="26" y="28" width="508" height="264" rx="12" fill="#ffffff" stroke="#d6dedb" stroke-width="2"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="18" fill="#1d292b">
