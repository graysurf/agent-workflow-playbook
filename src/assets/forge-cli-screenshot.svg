<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">forge-cli screenshot</title>
  <desc id="desc">Visual excerpt from forge-cli README showing provider-neutral CLI and commands.</desc>
  <rect width="900" height="560" fill="#1e292b"/>
  <rect x="40" y="36" width="820" height="488" rx="12" fill="#ffffff"/>
  <text x="74" y="94" fill="#1d2728" font-family="Arial, sans-serif" font-size="34" font-weight="700">forge-cli</text>
  <text x="74" y="130" fill="#314042" font-family="Arial, sans-serif" font-size="18">Provider-neutral CLI for remote forge operations.</text>
  <text x="74" y="158" fill="#314042" font-family="Arial, sans-serif" font-size="18">GitHub wraps gh. GitLab wraps glab. Output follows versioned contracts.</text>

  <rect x="74" y="202" width="752" height="240" rx="8" fill="#182225"/>
  <text x="104" y="244" fill="#dfe8e6" font-family="Menlo, monospace" font-size="18">forge-cli inbox list --format json</text>
  <text x="104" y="282" fill="#dfe8e6" font-family="Menlo, monospace" font-size="18">forge-cli inbox next --limit 5 --format json</text>
  <text x="104" y="320" fill="#dfe8e6" font-family="Menlo, monospace" font-size="18">forge-cli pr deliver --kind feature --dry-run --format json</text>
  <text x="104" y="358" fill="#dfe8e6" font-family="Menlo, monospace" font-size="18">forge-cli label audit --catalog manifests/forge-labels.yaml</text>
  <text x="104" y="404" fill="#e8c878" font-family="Menlo, monospace" font-size="18">Use --format text|json. No --json boolean flag.</text>

  <rect x="74" y="468" width="210" height="32" rx="16" fill="#e7f2ee"/>
  <text x="98" y="490" fill="#0d6f5d" font-family="Arial, sans-serif" font-size="15" font-weight="700">provider-neutral</text>
  <rect x="302" y="468" width="170" height="32" rx="16" fill="#edf2fb"/>
  <text x="326" y="490" fill="#315f9f" font-family="Arial, sans-serif" font-size="15" font-weight="700">dry-run first</text>
  <rect x="492" y="468" width="230" height="32" rx="16" fill="#fff7e1"/>
  <text x="516" y="490" fill="#8b650f" font-family="Arial, sans-serif" font-size="15" font-weight="700">machine-readable output</text>
</svg>
