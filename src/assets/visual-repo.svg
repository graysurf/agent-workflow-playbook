<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-labelledby="title desc">
  <title id="title">Repository evidence screenshot example</title>
  <desc id="desc">A repository file tree and source links used as traceable evidence next to a core concept.</desc>
  <rect width="560" height="320" rx="16" fill="#f6f8f4"/>
  <rect x="28" y="28" width="504" height="264" rx="12" fill="#ffffff" stroke="#d6dedb" stroke-width="2"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="56" y="58" width="448" height="42" rx="8" fill="#10252b"/>
    <circle cx="80" cy="79" r="6" fill="#e85d51"/>
    <circle cx="102" cy="79" r="6" fill="#e8b53f"/>
    <circle cx="124" cy="79" r="6" fill="#52b871"/>
    <text x="154" y="85" font-size="15" font-weight="900" fill="#e9f0ed">agent-runtime-kit / core</text>
    <rect x="56" y="112" width="160" height="136" rx="8" fill="#f2f5f2" stroke="#d6dedb"/>
    <g font-size="14" font-weight="800" fill="#536064">
      <text x="76" y="140">policies/</text>
      <text x="92" y="166">work-tier.md</text>
      <text x="92" y="192">heuristic-system/</text>
      <text x="76" y="218">skills/</text>
      <text x="92" y="236">deliver-pr/</text>
    </g>
    <rect x="236" y="112" width="268" height="136" rx="8" fill="#fbfcfb" stroke="#d6dedb"/>
    <g font-size="13" font-weight="800">
      <text x="258" y="140" fill="#0f7a65">source links</text>
      <text x="258" y="170" fill="#1d292b">core/policies/work-tier-levels.md</text>
      <text x="258" y="196" fill="#1d292b">core/policies/heuristic-system/</text>
      <text x="258" y="222" fill="#1d292b">core/skills/create-pr/SKILL.md</text>
    </g>
    <g stroke="#3463a3" stroke-width="2" stroke-linecap="round">
      <path d="M258 176 H458"/>
      <path d="M258 202 H462"/>
      <path d="M258 228 H438"/>
    </g>
    <rect x="56" y="260" width="448" height="16" rx="8" fill="#e7f2ee"/>
    <text x="76" y="272" font-size="12" font-weight="900" fill="#0f7a65">method claim links back to concrete repo source</text>
  </g>
</svg>
