<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">nils-alfredworkflow screenshot</title>
  <desc id="desc">Visual excerpt from nils-alfredworkflow README showing workflow list.</desc>
  <rect width="900" height="560" fill="#f6f8f5"/>
  <rect x="42" y="34" width="816" height="492" rx="12" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
  <text x="78" y="92" fill="#1d2728" font-family="Arial, sans-serif" font-size="32" font-weight="700">nils-alfredworkflow</text>
  <text x="78" y="126" fill="#5f6b6d" font-family="Arial, sans-serif" font-size="18">Alfred workflows for macOS users. Different frontend, same tool contracts.</text>

  <rect x="78" y="170" width="744" height="50" rx="8" fill="#1d2728"/>
  <text x="104" y="202" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Workflow</text>
  <text x="342" y="202" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Keyword</text>
  <text x="498" y="202" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">What it does</text>

  <g font-family="Arial, sans-serif" font-size="17">
    <rect x="78" y="238" width="744" height="54" rx="8" fill="#e7f2ee"/>
    <text x="104" y="272" fill="#0d6f5d" font-weight="700">Forge Inbox</text>
    <text x="342" y="272" fill="#1d2728">fi, fih, fil</text>
    <text x="498" y="272" fill="#1d2728">GitHub/GitLab inbox rows from forge-cli</text>

    <rect x="78" y="304" width="744" height="54" rx="8" fill="#edf2fb"/>
    <text x="104" y="338" fill="#315f9f" font-weight="700">Open Project</text>
    <text x="342" y="338" fill="#1d2728">c, code</text>
    <text x="498" y="338" fill="#1d2728">Find local Git projects and open remotes</text>

    <rect x="78" y="370" width="744" height="54" rx="8" fill="#fff7e1"/>
    <text x="104" y="404" fill="#8b650f" font-weight="700">Memo Add</text>
    <text x="342" y="404" fill="#1d2728">mm, memo</text>
    <text x="498" y="404" fill="#1d2728">Add/search memo text quickly</text>

    <rect x="78" y="436" width="744" height="54" rx="8" fill="#f4ece8"/>
    <text x="104" y="470" fill="#b54837" font-weight="700">Codex CLI</text>
    <text x="342" y="470" fill="#1d2728">cx, codex</text>
    <text x="498" y="470" fill="#1d2728">Run auth and diagnostics from Alfred</text>
  </g>
</svg>
