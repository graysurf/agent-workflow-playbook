<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-labelledby="title desc">
  <title id="title">Responsibility layer diagram example</title>
  <desc id="desc">Policies, skills, hooks, CLI contracts, and UI surfaces shown as separate responsibility layers.</desc>
  <rect width="560" height="320" rx="16" fill="#f6f8f4"/>
  <rect x="28" y="28" width="504" height="264" rx="12" fill="#ffffff" stroke="#d6dedb" stroke-width="2"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g>
      <rect x="58" y="58" width="444" height="40" rx="8" fill="#fff6de" stroke="#9a6a0b" stroke-width="2"/>
      <rect x="58" y="58" width="8" height="40" rx="4" fill="#9a6a0b"/>
      <text x="82" y="84" font-size="17" font-weight="800" fill="#7b560a">Policies</text>
      <text x="210" y="84" font-size="14" font-weight="700" fill="#536064">boundaries / allowed decisions</text>
    </g>
    <g>
      <rect x="58" y="108" width="444" height="40" rx="8" fill="#e8eef8" stroke="#3463a3" stroke-width="2"/>
      <rect x="58" y="108" width="8" height="40" rx="4" fill="#3463a3"/>
      <text x="82" y="134" font-size="17" font-weight="800" fill="#3463a3">Skills</text>
      <text x="210" y="134" font-size="14" font-weight="700" fill="#536064">workflow contract / stop points</text>
    </g>
    <g>
      <rect x="58" y="158" width="444" height="40" rx="8" fill="#f6e9e5" stroke="#b84f3e" stroke-width="2"/>
      <rect x="58" y="158" width="8" height="40" rx="4" fill="#b84f3e"/>
      <text x="82" y="184" font-size="17" font-weight="800" fill="#b84f3e">Hooks</text>
      <text x="210" y="184" font-size="14" font-weight="700" fill="#536064">runtime guardrails / gates</text>
    </g>
    <g>
      <rect x="58" y="208" width="444" height="40" rx="8" fill="#efe8f7" stroke="#6d4fa0" stroke-width="2"/>
      <rect x="58" y="208" width="8" height="40" rx="4" fill="#6d4fa0"/>
      <text x="82" y="234" font-size="17" font-weight="800" fill="#6d4fa0">CLI</text>
      <text x="210" y="234" font-size="14" font-weight="700" fill="#536064">deterministic primitive</text>
    </g>
    <g>
      <rect x="58" y="258" width="444" height="18" rx="6" fill="#e7f2ee" stroke="#0f7a65" stroke-width="2"/>
      <text x="82" y="272" font-size="13" font-weight="800" fill="#0f7a65">UI surfaces consume the same contracts</text>
    </g>
  </g>
</svg>
