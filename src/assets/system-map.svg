<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680" viewBox="0 0 920 680" role="img" aria-labelledby="title desc">
  <title id="title">Agent workflow system map</title>
  <desc id="desc">Human and agent share policies, skills, hooks, CLI contracts, frontends, and evidence.</desc>
  <rect width="920" height="680" fill="#f9fbf8"/>
  <rect x="40" y="40" width="840" height="600" rx="18" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
  <text x="72" y="96" fill="#1d2728" font-family="Arial, sans-serif" font-size="34" font-weight="700">Shared Agent Workflow Environment</text>
  <text x="72" y="132" fill="#5f6b6d" font-family="Arial, sans-serif" font-size="18">同一個工作環境，讓 human 和 agent 使用相同規則、工具與 evidence。</text>

  <rect x="72" y="178" width="220" height="92" rx="10" fill="#e7f2ee" stroke="#0d6f5d" stroke-width="2"/>
  <text x="98" y="214" fill="#0d6f5d" font-family="Arial, sans-serif" font-size="22" font-weight="700">Human</text>
  <text x="98" y="244" fill="#314042" font-family="Arial, sans-serif" font-size="16">CLI / Alfred / Web UI</text>

  <rect x="628" y="178" width="220" height="92" rx="10" fill="#edf2fb" stroke="#315f9f" stroke-width="2"/>
  <text x="654" y="214" fill="#315f9f" font-family="Arial, sans-serif" font-size="22" font-weight="700">Agent</text>
  <text x="654" y="244" fill="#314042" font-family="Arial, sans-serif" font-size="16">Skills / Hooks / Tools</text>

  <rect x="330" y="165" width="260" height="118" rx="10" fill="#fff7e1" stroke="#8b650f" stroke-width="2"/>
  <text x="360" y="204" fill="#8b650f" font-family="Arial, sans-serif" font-size="21" font-weight="700">Policies</text>
  <text x="360" y="234" fill="#314042" font-family="Arial, sans-serif" font-size="16">work tier, validation, git delivery</text>
  <text x="360" y="258" fill="#314042" font-family="Arial, sans-serif" font-size="16">external facts, docs placement</text>

  <line x1="292" y1="224" x2="330" y2="224" stroke="#637174" stroke-width="3"/>
  <line x1="590" y1="224" x2="628" y2="224" stroke="#637174" stroke-width="3"/>

  <rect x="116" y="340" width="688" height="74" rx="10" fill="#ffffff" stroke="#d8dfdc" stroke-width="2"/>
  <text x="146" y="385" fill="#1d2728" font-family="Arial, sans-serif" font-size="24" font-weight="700">Skills: decision-minimal workflow contracts</text>

  <rect x="116" y="442" width="208" height="86" rx="10" fill="#f4ece8" stroke="#b54837" stroke-width="2"/>
  <text x="144" y="478" fill="#b54837" font-family="Arial, sans-serif" font-size="20" font-weight="700">Hooks</text>
  <text x="144" y="506" fill="#314042" font-family="Arial, sans-serif" font-size="15">guardrails</text>

  <rect x="356" y="442" width="208" height="86" rx="10" fill="#f0edf7" stroke="#6c4d8f" stroke-width="2"/>
  <text x="384" y="478" fill="#6c4d8f" font-family="Arial, sans-serif" font-size="20" font-weight="700">CLI Contracts</text>
  <text x="384" y="506" fill="#314042" font-family="Arial, sans-serif" font-size="15">nils-cli / forge-cli</text>

  <rect x="596" y="442" width="208" height="86" rx="10" fill="#edf2fb" stroke="#315f9f" stroke-width="2"/>
  <text x="624" y="478" fill="#315f9f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Frontends</text>
  <text x="624" y="506" fill="#314042" font-family="Arial, sans-serif" font-size="15">Alfred / Board / Pages</text>

  <rect x="116" y="560" width="688" height="52" rx="10" fill="#e7f2ee" stroke="#0d6f5d" stroke-width="2"/>
  <text x="170" y="594" fill="#0d6f5d" font-family="Arial, sans-serif" font-size="20" font-weight="700">Evidence + Heuristic System: learn from workflow results</text>

  <path d="M460 284 L460 340" stroke="#637174" stroke-width="3" fill="none"/>
  <path d="M460 414 L460 442" stroke="#637174" stroke-width="3" fill="none"/>
  <path d="M220 528 L220 560" stroke="#637174" stroke-width="3" fill="none"/>
  <path d="M460 528 L460 560" stroke="#637174" stroke-width="3" fill="none"/>
  <path d="M700 528 L700 560" stroke="#637174" stroke-width="3" fill="none"/>
</svg>
